# johnplustools.com. Static site, generated locally by build.py.
# index.html is the home page; each tool is its own page under tools/.

[build]
  publish = "."

# Short URLs: /debate-builder serves /tools/debate-builder.html, and so on for
# every tool. force = false, so a real file at that path always wins.
[[redirects]]
  from = "/:tool"
  to = "/tools/:tool.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Sources and tests are not part of the site.
[[headers]]
  for = "/src/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/tests/*"
  [headers.values]
    X-Robots-Tag = "noindex"
