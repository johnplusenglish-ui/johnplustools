# johnplustools.com. Static site, no build step on Netlify, no functions.
# index.html is generated locally by build.py from src/debate-builder.html.

[build]
  publish = "."

# Order matters: Netlify applies the first matching rule, so these specific
# redirects have to sit above the /:tool catch-all or it swallows them.

# The Debate Builder is the homepage now. Keep older links working.
[[redirects]]
  from = "/debate-builder"
  to = "/"
  status = 301

[[redirects]]
  from = "/tools/debate-builder.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/tools/debate-builder"
  to = "/"
  status = 301

# Short URLs for the tools still living in tools/ (unlinked for now).
# force = false, so a real file at that path always wins.
[[redirects]]
  from = "/:tool"
  to = "/tools/:tool.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Source and tests are not part of the site.
[[headers]]
  for = "/src/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/tests/*"
  [headers.values]
    X-Robots-Tag = "noindex"
