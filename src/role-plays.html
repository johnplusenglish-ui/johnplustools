<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Plays</title>
<meta name="description" content="Pair role-play cards for English speaking practice.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f3ec;--card:#fff;--ink:#0f1b2d;--muted:#6b7686;--line:#eceadf;--accent:#2563eb;--soft:#eceffc;--soft-line:#dde3f8;--jpt-bar:68px;--jpt-side-w:302px}
*{box-sizing:border-box}
body{margin:0;font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink)}
button{font-family:inherit;cursor:pointer}

.app{display:grid;grid-template-columns:var(--jpt-side-w) 1fr;min-height:calc(100vh - var(--jpt-bar));transition:grid-template-columns .22s ease}
.app.side-collapsed{grid-template-columns:0 1fr}
.app.side-collapsed > aside{border-right:none;overflow:hidden;opacity:0;pointer-events:none}
.app > aside{background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto;position:sticky;top:var(--jpt-bar);height:calc(100vh - var(--jpt-bar))}
main{overflow:visible;min-width:0}
.main-inner{padding:20px 24px 40px;max-width:1180px;margin:0 auto}

.side-top{padding:16px 16px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:2}
.jt-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:9px}
.search-wrap{position:relative}
.search-input{width:100%;font-family:inherit;font-size:14px;padding:9px 12px 9px 34px;border-radius:999px;border:1px solid var(--soft-line);background:var(--bg);color:var(--ink);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:12px;top:50%;width:14px;height:14px;transform:translateY(-50%);pointer-events:none;color:var(--muted)}

.side-list{padding:10px 10px 16px}
.side-group{margin-bottom:6px}
.side-group-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;width:100%;padding:7px 10px;border-radius:9px;background:transparent;border:none;transition:background .12s}
.side-group-toggle:hover{background:var(--soft)}
.side-group-name{flex:1;font-size:11px;letter-spacing:.13em;text-transform:uppercase;font-weight:700;color:var(--accent);text-align:left}
.side-group.lvl-Simple .side-group-name{color:#6b8cd6}
.side-group.lvl-Everyday .side-group-name{color:#3b6ec4}
.side-group.lvl-Advanced .side-group-name{color:#2563eb}
.side-group.lvl-Fun .side-group-name{color:#1e3a8a}
[data-theme="dark"] .side-group.lvl-Simple .side-group-name{color:#b8d4f7}
[data-theme="dark"] .side-group.lvl-Everyday .side-group-name{color:#8fb3e8}
[data-theme="dark"] .side-group.lvl-Advanced .side-group-name{color:#5b8def}
[data-theme="dark"] .side-group.lvl-Fun .side-group-name{color:#7ba4de}
.side-group-chevron{font-size:9px;color:var(--muted);transition:transform .18s ease}
.side-group.open .side-group-chevron{transform:rotate(180deg)}
.side-group-body{display:none;padding:2px 0 4px}
.side-group.open .side-group-body{display:block}

.rp-item{display:block;width:100%;text-align:left;font-family:inherit;padding:8px 11px;border-radius:10px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--ink);margin-bottom:2px;transition:background .12s,border-color .12s;line-height:1.35}
.rp-item:hover{background:var(--soft)}
.rp-item.active{background:var(--soft);border-color:var(--accent);color:var(--accent)}
.rp-item .rp-title{font-size:13.5px;font-weight:600;letter-spacing:-.01em;display:block}
.rp-item .rp-cat{display:block;font-size:10px;color:var(--muted);letter-spacing:.12em;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.rp-item.active .rp-cat{color:var(--accent);opacity:.7}

.empty{padding:32px 20px;text-align:center;color:var(--muted);font-style:italic;font-size:13px}

.rp-placeholder{background:var(--card);border:1px dashed var(--line);border-radius:16px;padding:48px 24px;text-align:center;color:var(--muted);font-size:.95rem;margin-top:20px}

.rp-view{margin-top:20px}
.rp-head{display:flex;align-items:center;gap:12px;padding:2px 4px 20px;flex-wrap:wrap}
.rp-h-title{font-size:1.4rem;font-weight:700;line-height:1.2;flex:1;min-width:0}
.rp-badge{background:var(--soft);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;border-radius:999px}
.rp-badge.rp-cat-badge{background:transparent;border:1px solid var(--soft-line);color:var(--muted)}

.rp-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.rp-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;box-shadow:0 1px 2px rgba(20,30,60,.04)}
.rp-card .rp-who{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px}
.rp-card .rp-role{font-size:1.15rem;font-weight:700;margin-bottom:12px;color:var(--accent)}
.rp-card .rp-desc{font-size:1rem;line-height:1.55}

.rp-nav{display:flex;align-items:center;gap:10px;padding:20px 4px 0}
.rp-nav .rp-counter{margin:0 auto;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700}
.rp-nav-btn{font-family:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;border:1px solid var(--soft-line);background:transparent;color:var(--muted);transition:.12s}
.rp-nav-btn:hover:not(:disabled){background:var(--soft);color:var(--accent);border-color:var(--accent)}
.rp-nav-btn:disabled{opacity:.35;cursor:default}

@media (max-width:900px){
  .rp-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="app" id="app">
  <aside>
    <div class="side-top">
      <div class="jt-label">Find a scenario</div>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="rpSearch" placeholder="Search all 200 scenarios..." autocomplete="off">
      </div>
    </div>
    <div class="side-list" id="rpList"></div>
  </aside>

  <main>
    <div class="main-inner">
      <div class="rp-placeholder" id="rpPlaceholder">Pick a scenario from the list, or search for a role play.</div>
      <div class="rp-view" id="rpView" style="display:none">
        <div class="rp-head">
          <span class="rp-h-title" id="rpTitle"></span>
          <span class="rp-badge" id="rpLevel"></span>
          <span class="rp-badge rp-cat-badge" id="rpCat"></span>
        </div>
        <div class="rp-cards">
          <div class="rp-card">
            <div class="rp-who">Student A</div>
            <div class="rp-role" id="rpARole"></div>
            <div class="rp-desc" id="rpADesc"></div>
          </div>
          <div class="rp-card">
            <div class="rp-who">Student B</div>
            <div class="rp-role" id="rpBRole"></div>
            <div class="rp-desc" id="rpBDesc"></div>
          </div>
        </div>
        <div class="rp-nav">
          <button class="rp-nav-btn" id="rpPrev" type="button">&larr; Previous</button>
          <span class="rp-counter" id="rpCounter"></span>
          <button class="rp-nav-btn" id="rpNext" type="button">Next &rarr;</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const RP_LEVELS = ['Simple', 'Everyday', 'Advanced', 'Fun'];
var ROLEPLAYS = [{"id":1,"cat":"Shopping","lvl":"Simple","title":"Buying a coffee","a":{"role":"Customer","desc":"Order a large coffee with milk. Ask how much it costs."},"b":{"role":"Barista","desc":"Greet the customer. The large coffee with milk is £3.40. Ask if they want anything else."}},{"id":2,"cat":"Shopping","lvl":"Simple","title":"Buying fruit","a":{"role":"Customer","desc":"You want to buy a kilo of apples and some bananas. Ask the price."},"b":{"role":"Shopkeeper","desc":"Apples are £2.50/kg. Bananas are £1.20 a bunch. Be friendly."}},{"id":3,"cat":"Shopping","lvl":"Simple","title":"Paying by card","a":{"role":"Customer","desc":"You want to pay by card. Ask if they accept contactless."},"b":{"role":"Cashier","desc":"You accept cards but the contactless machine is broken. Ask them to insert the card."}},{"id":4,"cat":"Shopping","lvl":"Simple","title":"Trying on shoes","a":{"role":"Customer","desc":"You like the black shoes in the window. Ask if they have your size (42)."},"b":{"role":"Shop assistant","desc":"You have size 42 in brown only. The black ones come in 41 and 43. Offer to check the back."}},{"id":5,"cat":"Shopping","lvl":"Simple","title":"Buying a SIM card","a":{"role":"Tourist","desc":"You need a prepaid SIM card with data. Ask about options and cost."},"b":{"role":"Shop assistant","desc":"You have two plans: 5GB for €10 or 15GB for €20. Both last 30 days. Explain clearly."}},{"id":6,"cat":"Shopping","lvl":"Simple","title":"At the bakery","a":{"role":"Customer","desc":"Buy two croissants and a loaf of bread. Ask if the bread is fresh today."},"b":{"role":"Baker","desc":"The bread was baked this morning. Croissants are €1.50 each. Ask if they want a bag."}},{"id":7,"cat":"Restaurant & Food","lvl":"Simple","title":"Ordering lunch","a":{"role":"Customer","desc":"Order a sandwich and a glass of water. Ask what soups are available today."},"b":{"role":"Waiter/Waitress","desc":"Today's soups are tomato and chicken. The sandwich menu is on the board. Take the order."}},{"id":8,"cat":"Restaurant & Food","lvl":"Simple","title":"Asking for the bill","a":{"role":"Customer","desc":"You've finished eating. Ask for the bill. Ask if service is included."},"b":{"role":"Waiter/Waitress","desc":"The total is €24.50. Service is not included. Bring the bill and offer the card machine."}},{"id":9,"cat":"Restaurant & Food","lvl":"Simple","title":"Ordering a takeaway by phone","a":{"role":"Customer","desc":"Call and order a medium pizza with mushrooms and peppers for delivery."},"b":{"role":"Pizza shop staff","desc":"Take the order. Delivery takes 30–40 minutes. Ask for the address and a contact number."}},{"id":10,"cat":"Restaurant & Food","lvl":"Simple","title":"Asking about the menu","a":{"role":"Customer","desc":"You don't understand some items on the menu. Ask what 'risotto' and 'bruschetta' are."},"b":{"role":"Waiter/Waitress","desc":"Explain each dish in simple English. Recommend the risotto — it's the chef's speciality."}},{"id":11,"cat":"Travel & Transport","lvl":"Simple","title":"Buying a bus ticket","a":{"role":"Passenger","desc":"Ask for a return ticket to the city centre. Ask how long the journey takes."},"b":{"role":"Bus driver","desc":"A return is £4.80. The journey is about 20 minutes. Tell them which stop to get off at."}},{"id":12,"cat":"Travel & Transport","lvl":"Simple","title":"At the train station","a":{"role":"Traveller","desc":"You need the next train to Manchester. Ask which platform and what time it leaves."},"b":{"role":"Station staff","desc":"The next train is at 14:25 from platform 3. It arrives at 16:10. There's a change at Birmingham."}},{"id":13,"cat":"Travel & Transport","lvl":"Simple","title":"Checking into a hotel","a":{"role":"Guest","desc":"You have a reservation for two nights under your name. Check in and ask about breakfast times."},"b":{"role":"Receptionist","desc":"Find the booking. Breakfast is from 7 to 10. The room is on the third floor. Give them the key card."}},{"id":14,"cat":"Travel & Transport","lvl":"Simple","title":"Asking for directions","a":{"role":"Tourist","desc":"Ask how to get to the nearest supermarket. You're on foot."},"b":{"role":"Passer-by","desc":"The supermarket is 5 minutes' walk. Go straight, turn left at the traffic lights, it's on the right."}},{"id":15,"cat":"Travel & Transport","lvl":"Simple","title":"At the airport check-in","a":{"role":"Passenger","desc":"Check in for your flight. You have one suitcase and a carry-on. Ask about the gate."},"b":{"role":"Check-in agent","desc":"Check the luggage weight (max 23kg). The gate is B12. Boarding starts at 15:40."}},{"id":16,"cat":"Everyday Life","lvl":"Simple","title":"Introducing yourself","a":{"role":"New student","desc":"It's your first day at a language school. Introduce yourself — name, nationality, why you're learning English."},"b":{"role":"Classmate","desc":"Welcome them. Introduce yourself too. Ask what they like to do in their free time."}},{"id":17,"cat":"Everyday Life","lvl":"Simple","title":"Making a phone call","a":{"role":"Caller","desc":"Phone your friend to arrange a meeting time tomorrow. Suggest 3pm at the café."},"b":{"role":"Friend","desc":"3pm doesn't work — you finish work at 4. Suggest 4:30 instead. Agree on a place."}},{"id":18,"cat":"Everyday Life","lvl":"Simple","title":"Talking about the weather","a":{"role":"Person A","desc":"You're waiting at a bus stop. Start a conversation about the weather. It's been raining all week."},"b":{"role":"Person B","desc":"Agree — the weather has been terrible. Say you heard it might be sunny on Saturday."}},{"id":19,"cat":"Everyday Life","lvl":"Simple","title":"Asking about opening times","a":{"role":"Caller","desc":"Phone the library to ask when it opens and closes today, and whether it's open on Sundays."},"b":{"role":"Library staff","desc":"Open Monday–Saturday 9am–6pm. Closed Sundays. Mention there's late opening on Thursdays until 8pm."}},{"id":20,"cat":"Everyday Life","lvl":"Simple","title":"Leaving a voicemail","a":{"role":"Caller","desc":"You're calling the dentist to change your appointment. Nobody answers. Leave a voicemail with your name, number, and request."},"b":{"role":"Receptionist (calling back)","desc":"You got the voicemail. Call back, confirm the name and offer a new time: Thursday at 2pm."}},{"id":21,"cat":"Services","lvl":"Simple","title":"Posting a letter","a":{"role":"Customer","desc":"You want to send a letter to France. Ask how much a stamp costs and how long it takes."},"b":{"role":"Postal clerk","desc":"A stamp to France costs £1.85. Standard delivery takes 5–7 working days. Offer the express option."}},{"id":22,"cat":"Services","lvl":"Simple","title":"Getting a haircut","a":{"role":"Customer","desc":"You want a trim — just a little off the sides and back. Explain what you want."},"b":{"role":"Hairdresser","desc":"Ask how short, whether they want scissors or clippers, and if they want a wash first."}},{"id":23,"cat":"Services","lvl":"Simple","title":"Registering at a gym","a":{"role":"Customer","desc":"Ask about membership prices, opening hours, and whether there's a swimming pool."},"b":{"role":"Gym receptionist","desc":"Monthly membership is £35. Open 6am–10pm. No pool, but there's a sauna. Offer a free trial."}},{"id":24,"cat":"Services","lvl":"Simple","title":"Booking a table","a":{"role":"Caller","desc":"Book a table for two for Friday evening at 7:30pm."},"b":{"role":"Restaurant staff","desc":"7:30 is available. Ask for the name and a contact number. Mention the kitchen closes at 10pm."}},{"id":25,"cat":"Services","lvl":"Simple","title":"Reporting a problem to reception","a":{"role":"Hotel guest","desc":"The Wi-Fi in your room isn't working. Call reception and ask for help."},"b":{"role":"Receptionist","desc":"Apologise. Give them the correct password. If it still doesn't work, offer to send someone up."}},{"id":26,"cat":"Health","lvl":"Simple","title":"At the pharmacy","a":{"role":"Customer","desc":"You have a headache. Ask the pharmacist to recommend something."},"b":{"role":"Pharmacist","desc":"Recommend paracetamol or ibuprofen. Ask if they have any allergies. Explain the dosage."}},{"id":27,"cat":"Health","lvl":"Simple","title":"Booking a doctor's appointment","a":{"role":"Patient","desc":"Phone the surgery. You need an appointment this week — you've had a cough for five days."},"b":{"role":"Receptionist","desc":"The earliest available is Thursday at 11:20am. Ask for date of birth and confirm the time."}},{"id":28,"cat":"Health","lvl":"Simple","title":"Describing symptoms","a":{"role":"Patient","desc":"You have a sore throat and a runny nose. Tell the doctor when it started and how you feel."},"b":{"role":"Doctor","desc":"Ask follow-up questions: temperature? eating normally? taking any medicine? Advise rest and fluids."}},{"id":29,"cat":"Work","lvl":"Simple","title":"Answering the office phone","a":{"role":"Caller","desc":"You're calling to speak to Ms. Taylor in accounts. Explain who you are and why you're calling."},"b":{"role":"Receptionist","desc":"Ms. Taylor is in a meeting. Offer to take a message or put the caller through to voicemail."}},{"id":30,"cat":"Work","lvl":"Simple","title":"Asking a colleague for help","a":{"role":"Employee","desc":"You can't work the new printer. Ask your colleague to show you how."},"b":{"role":"Colleague","desc":"Show them step by step. Be patient and friendly."}},{"id":31,"cat":"Home","lvl":"Simple","title":"Greeting a new neighbour","a":{"role":"Resident","desc":"Someone just moved in next door. Say hello, introduce yourself, and offer to help."},"b":{"role":"New neighbour","desc":"You've just arrived. Thank them and ask a practical question: bins, parking, or local shops."}},{"id":32,"cat":"Home","lvl":"Simple","title":"Ordering a takeaway at the door","a":{"role":"Customer","desc":"The delivery driver is at your door. Check the order is correct and pay."},"b":{"role":"Delivery driver","desc":"Hand over the food. The total is £18.50. You don't have change for a £20 note."}},{"id":33,"cat":"Social","lvl":"Simple","title":"Inviting someone for coffee","a":{"role":"Person A","desc":"Invite your classmate for a coffee after class. Suggest a place nearby."},"b":{"role":"Person B","desc":"Accept the invitation. Ask what time and where exactly. Say you'll bring another friend."}},{"id":34,"cat":"Social","lvl":"Simple","title":"Talking about your weekend","a":{"role":"Person A","desc":"Tell your partner about what you did last weekend. You went to the cinema and cooked dinner."},"b":{"role":"Person B","desc":"Ask follow-up questions: What film? Was it good? What did you cook? Share your weekend too."}},{"id":35,"cat":"Social","lvl":"Simple","title":"Giving a compliment","a":{"role":"Person A","desc":"Your friend is wearing a new jacket. Compliment them and ask where they got it."},"b":{"role":"Person B","desc":"Thank them. Say where you bought it, how much it cost, and that it was on sale."}},{"id":36,"cat":"Social","lvl":"Simple","title":"Saying goodbye at a party","a":{"role":"Guest","desc":"You need to leave a party early. Say goodbye to the host, thank them, and explain why you're leaving."},"b":{"role":"Host","desc":"You're sad they're leaving. Thank them for coming and say you hope to see them again soon."}},{"id":37,"cat":"Social","lvl":"Simple","title":"Talking about hobbies","a":{"role":"Person A","desc":"Ask your partner about their hobbies. Find out how often they do them."},"b":{"role":"Person B","desc":"You play football on Saturdays and read a lot. Ask them about their hobbies too."}},{"id":38,"cat":"Shopping","lvl":"Simple","title":"Exchanging a jumper","a":{"role":"Customer","desc":"You bought a jumper yesterday but it's too big. You have the receipt. Ask to exchange it."},"b":{"role":"Shop assistant","desc":"No problem — ask what size they need. Check stock and do the exchange."}},{"id":39,"cat":"Travel & Transport","lvl":"Simple","title":"Asking about a delay","a":{"role":"Passenger","desc":"Your flight departure screen says 'delayed'. Ask at the desk what's happening."},"b":{"role":"Airline staff","desc":"The flight is delayed by 1 hour due to weather. It will now depart at 18:30. Apologise."}},{"id":40,"cat":"Everyday Life","lvl":"Simple","title":"Lost and found","a":{"role":"Person","desc":"You left your umbrella on the train this morning. Go to the lost property desk and describe it."},"b":{"role":"Lost property staff","desc":"Ask what it looks like, what time the train was, and which carriage. You think you have it."}},{"id":41,"cat":"Restaurant & Food","lvl":"Simple","title":"Ordering breakfast","a":{"role":"Guest","desc":"Order breakfast at your hotel: eggs, toast, orange juice. Ask if you can have them scrambled."},"b":{"role":"Waiter/Waitress","desc":"Take the order. Scrambled is fine. Ask if they want tea or coffee with that."}},{"id":42,"cat":"Services","lvl":"Simple","title":"Collecting a prescription","a":{"role":"Patient","desc":"Your doctor sent a prescription to this pharmacy. Give your name and collect it."},"b":{"role":"Pharmacy assistant","desc":"Find the prescription. Check their name and date of birth. Explain the dosage instructions."}},{"id":43,"cat":"Everyday Life","lvl":"Simple","title":"Buying cinema tickets","a":{"role":"Customer","desc":"Ask what's showing tonight. Buy two tickets for the 8pm film."},"b":{"role":"Box office staff","desc":"Three films are showing. The 8pm is almost full — only front row left. Offer the 8:30 alternative."}},{"id":44,"cat":"Health","lvl":"Simple","title":"Calling in sick to school","a":{"role":"Parent","desc":"Phone your child's school. Your daughter has a fever and won't be in today."},"b":{"role":"School receptionist","desc":"Ask for the child's name and class. Wish them a speedy recovery. Mention homework can be emailed."}},{"id":45,"cat":"Shopping","lvl":"Simple","title":"Asking for a bag","a":{"role":"Customer","desc":"You've bought several items. Ask if you can have a bag and how much it costs."},"b":{"role":"Cashier","desc":"Bags cost 25p. You also have larger bags for 75p. Ask which they'd prefer."}},{"id":46,"cat":"Travel & Transport","lvl":"Simple","title":"Taking a taxi","a":{"role":"Passenger","desc":"Get in a taxi. Tell the driver your destination and ask roughly how long it will take."},"b":{"role":"Taxi driver","desc":"It'll take about 15 minutes. Ask if they have a preference on which route to take."}},{"id":47,"cat":"Social","lvl":"Simple","title":"Congratulating someone","a":{"role":"Friend","desc":"Your friend just passed their driving test. Congratulate them enthusiastically."},"b":{"role":"Friend","desc":"Thank them. Say it was your third attempt. You're very relieved."}},{"id":48,"cat":"Work","lvl":"Simple","title":"Asking about a deadline","a":{"role":"Employee","desc":"You're not sure when the report is due. Ask your colleague."},"b":{"role":"Colleague","desc":"It's due on Friday by 5pm. Offer to share the template if they need it."}},{"id":49,"cat":"Home","lvl":"Simple","title":"Signing for a parcel","a":{"role":"Resident","desc":"A delivery driver rings the bell with a parcel for your neighbour who's out. Decide whether to accept it."},"b":{"role":"Delivery driver","desc":"Ask if they can take it. Get a signature. Explain where to sign."}},{"id":50,"cat":"Everyday Life","lvl":"Simple","title":"Borrowing a pen","a":{"role":"Person A","desc":"You need to fill in a form but you don't have a pen. Ask the person next to you."},"b":{"role":"Person B","desc":"You have a pen. Lend it to them. Make small talk while they fill in the form."}},{"id":51,"cat":"Shopping","lvl":"Everyday","title":"Returning a faulty item","a":{"role":"Customer","desc":"You bought a blender last week and it stopped working after two uses. You want a full refund, not a replacement."},"b":{"role":"Shop assistant","desc":"Your store policy allows exchanges or store credit within 14 days, but not cash refunds on electrical items."}},{"id":52,"cat":"Shopping","lvl":"Everyday","title":"Asking for a discount","a":{"role":"Customer","desc":"You're buying a leather jacket that has a small scratch on the sleeve. Ask for a discount."},"b":{"role":"Shop owner","desc":"The jacket is already on sale. You can offer 5% more off, but no further."}},{"id":53,"cat":"Shopping","lvl":"Everyday","title":"Finding the right size","a":{"role":"Customer","desc":"You're looking for a formal shirt for a wedding. You're not sure of your size and need help."},"b":{"role":"Sales assistant","desc":"Help the customer find the right fit. Suggest accessories to go with the shirt."}},{"id":54,"cat":"Shopping","lvl":"Everyday","title":"Wrong online order","a":{"role":"Customer","desc":"You ordered white trainers online but received the wrong colour. You want the correct ones sent immediately."},"b":{"role":"Customer service rep","desc":"The correct colour is out of stock for 3 weeks. Offer alternatives: a refund, a different colour, or a voucher."}},{"id":55,"cat":"Shopping","lvl":"Everyday","title":"At the farmers' market","a":{"role":"Customer","desc":"You want to buy fruit and vegetables for a dinner party of 8. Ask for recommendations and quantities."},"b":{"role":"Market stallholder","desc":"You're proud of your produce. Recommend seasonal items and suggest a recipe."}},{"id":56,"cat":"Shopping","lvl":"Everyday","title":"Gift shopping dilemma","a":{"role":"Customer","desc":"You need a birthday gift for a colleague you don't know well. Your budget is about £20."},"b":{"role":"Shop assistant","desc":"Suggest several safe gift options within the budget. Ask a few questions to narrow it down."}},{"id":57,"cat":"Restaurant & Food","lvl":"Everyday","title":"Dietary needs","a":{"role":"Customer","desc":"You're vegan and have a nut allergy. Ask about the menu and request modifications."},"b":{"role":"Waiter/Waitress","desc":"Only two dishes are fully vegan. One contains traces of nuts. Explain the options clearly."}},{"id":58,"cat":"Restaurant & Food","lvl":"Everyday","title":"Complaining about a meal","a":{"role":"Diner","desc":"Your steak is overcooked and the soup was cold. You've been waiting 45 minutes. Express your dissatisfaction politely."},"b":{"role":"Restaurant manager","desc":"The kitchen is short-staffed tonight. Apologise and try to keep the customer happy — offer a solution."}},{"id":59,"cat":"Restaurant & Food","lvl":"Everyday","title":"Booking complications","a":{"role":"Caller","desc":"Book a table for 6 on Saturday at 8pm. One guest uses a wheelchair."},"b":{"role":"Receptionist","desc":"Saturday at 8pm is full. You have 7pm or 9:15pm. The accessible table seats max 5."}},{"id":60,"cat":"Restaurant & Food","lvl":"Everyday","title":"Splitting the bill","a":{"role":"Friend A","desc":"You only had a salad and water. Your friend had steak and cocktails. You don't want to split equally."},"b":{"role":"Friend B","desc":"You prefer splitting equally because it's simpler. You don't want it to become awkward."}},{"id":61,"cat":"Restaurant & Food","lvl":"Everyday","title":"Street food abroad","a":{"role":"Tourist","desc":"You're at a street food stall and can't read the menu. Ask what things are and what's popular."},"b":{"role":"Stall vendor","desc":"You speak some English. Describe your dishes enthusiastically. Your speciality is very spicy."}},{"id":62,"cat":"Restaurant & Food","lvl":"Everyday","title":"Sending food back","a":{"role":"Customer","desc":"You found a hair in your pasta. You want a replacement and expect not to be charged."},"b":{"role":"Waiter/Waitress","desc":"Apologise sincerely. Offer a new dish and a complimentary dessert. Keep things calm."}},{"id":63,"cat":"Travel & Transport","lvl":"Everyday","title":"Lost luggage","a":{"role":"Passenger","desc":"Your suitcase didn't arrive. It has medication you need tonight. You're anxious."},"b":{"role":"Airline staff","desc":"The bag is likely on the next flight in 5 hours. Offer to deliver it to the hotel and help with the medication."}},{"id":64,"cat":"Travel & Transport","lvl":"Everyday","title":"Detailed directions","a":{"role":"Tourist","desc":"You're lost and need the national museum. Your phone has died."},"b":{"role":"Local resident","desc":"It's a 15-minute walk. Give clear directions using landmarks. Mention a shortcut through the park."}},{"id":65,"cat":"Travel & Transport","lvl":"Everyday","title":"Train delay complaint","a":{"role":"Commuter","desc":"Your train is delayed 40 minutes — third time this week. You'll miss an important meeting."},"b":{"role":"Station staff","desc":"Signal problems. You can offer a delay-repay form but not much else. Stay professional."}},{"id":66,"cat":"Travel & Transport","lvl":"Everyday","title":"Renting a car","a":{"role":"Customer","desc":"Rent a small car for 5 days. You don't want extra insurance. Ask about the total cost."},"b":{"role":"Car hire agent","desc":"Strongly recommend the insurance. Try to upsell a bigger car for only €10/day more."}},{"id":67,"cat":"Travel & Transport","lvl":"Everyday","title":"Hotel room problem","a":{"role":"Guest","desc":"You booked a double room with a sea view but got a single facing the car park."},"b":{"role":"Receptionist","desc":"The hotel is full. The only option is a suite upgrade at a small extra charge. Find a solution."}},{"id":68,"cat":"Travel & Transport","lvl":"Everyday","title":"Taxi ride chat","a":{"role":"Passenger","desc":"You're visiting for the first time. Ask the driver for recommendations."},"b":{"role":"Taxi driver","desc":"You love your city. Share your favourite spots, including a hidden gem tourists miss."}},{"id":69,"cat":"Work & Office","lvl":"Everyday","title":"Asking for a pay rise","a":{"role":"Employee","desc":"You've been in the role for 2 years with great reviews. You want a 10% raise."},"b":{"role":"Manager","desc":"Budget is tight. You value them but can only offer 4% now with a review in 6 months."}},{"id":70,"cat":"Work & Office","lvl":"Everyday","title":"Calling in sick","a":{"role":"Employee","desc":"You have a t  chat — but you're also looking for clients."}},{"id":77,"cat":"Health & Medical","lvl":"Everyday","title":"Persistent headache","a":{"role":"Patient","desc":"You've had a headache for two weeks and trouble sleeping. Describe your symptoms."},"b":{"role":"Doctor","desc":"Ask about lifestyle, stress, and screen time. Recommend next steps."}},{"id":78,"cat":"Health & Medical","lvl":"Everyday","title":"Pharmacy advice","a":{"role":"Customer","desc":"Sore throat and cough. Unsure what to take or whether to see a doctor."},"b":{"role":"Pharmacist","desc":"Ask about duration and severity. Recommend OTC options and when to see a GP."}},{"id":79,"cat":"Health & Medical","lvl":"Everyday","title":"Calling an ambulance","a":{"role":"Caller","desc":"Your friend fell and can't move their ankle. Describe the situation and location."},"b":{"role":"Emergency operator","desc":"Ask: conscious? can they move? Get the exact address. Give first-aid advice."}},{"id":80,"cat":"Health & Medical","lvl":"Everyday","title":"Urgent dental appointment","a":{"role":"Patient","desc":"You've chipped a tooth — it hurts with cold drinks. You need an urgent slot."},"b":{"role":"Dental receptionist","desc":"Next regular slot is next week, but there's a cancellation tomorrow at 7:45am."}},{"id":81,"cat":"Health & Medical","lvl":"Everyday","title":"Test results","a":{"role":"Patient","desc":"You've had blood tests and you're nervous. Ask the doctor to explain everything."},"b":{"role":"Doctor","desc":"Slightly high cholesterol, nothing alarming. Explain simply and suggest lifestyle changes."}},{"id":82,"cat":"Home & Neighbours","lvl":"Everyday","title":"Noise complaint","a":{"role":"Neighbour A","desc":"Your neighbour's dog barks at night. You haven't slept in days. Raise it politely."},"b":{"role":"Neighbour B","desc":"You didn't realise. The dog has separation anxiety. Discuss solutions."}},{"id":83,"cat":"Home & Neighbours","lvl":"Everyday","title":"Calling a plumber","a":{"role":"Tenant","desc":"Kitchen tap dripping for a week, now the pipe is leaking. Describe the problem."},"b":{"role":"Plumber","desc":"You can come tomorrow morning. Ask questions and estimate the job."}},{"id":84,"cat":"Home & Neighbours","lvl":"Everyday","title":"Viewing a flat","a":{"role":"Prospective tenant","desc":"Ask about bills, contract length, neighbourhood, and pet policy."},"b":{"role":"Landlord/Agent","desc":"Bills not included. No pets. Min 12-month contract. Sell the property."}},{"id":85,"cat":"Home & Neighbours","lvl":"Everyday","title":"Borrowing a ladder","a":{"role":"Neighbour","desc":"You need to borrow a ladder to change a lightbulb. Knock on your neighbour's door."},"b":{"role":"Neighbour","desc":"Happy to lend it but you need it back by tomorrow. Make friendly small talk."}},{"id":86,"cat":"Home & Neighbours","lvl":"Everyday","title":"Parcel mix-up","a":{"role":"Resident A","desc":"Your parcel was delivered to your neighbour. Knock and ask for it."},"b":{"role":"Resident B","desc":"You opened it by accident. Apologise and hand it over."}},{"id":87,"cat":"Social & Everyday","lvl":"Everyday","title":"Weekend plans","a":{"role":"Friend A","desc":"You want to meet up this weekend. You prefer something outdoors."},"b":{"role":"Friend B","desc":"Free Saturday only. You'd rather do something indoors. Find a compromise."}},{"id":88,"cat":"Social & Everyday","lvl":"Everyday","title":"Apologising for being late","a":{"role":"Late friend","desc":"You're 30 minutes late. Traffic was terrible. Apologise and explain."},"b":{"role":"Waiting friend","desc":"You're annoyed — not the first time. Express frustration without fighting."}},{"id":89,"cat":"Social & Everyday","lvl":"Everyday","title":"Meeting someone at a party","a":{"role":"Guest A","desc":"You only know the host. Start a conversation with a stranger."},"b":{"role":"Guest B","desc":"You're friendly. Ask questions, find common ground, keep the chat going."}},{"id":90,"cat":"Social & Everyday","lvl":"Everyday","title":"Cancelling plans","a":{"role":"Person A","desc":"You agreed to a concert tonight but you're exhausted. Cancel honestly."},"b":{"role":"Person B","desc":"You bought non-refundable tickets. You're disappointed. Discuss options."}},{"id":91,"cat":"Social & Everyday","lvl":"Everyday","title":"Breaking bad news","a":{"role":"Friend A","desc":"You broke your friend's favourite mug while house-sitting. Tell them."},"b":{"role":"Friend B","desc":"That mug had sentimental value. React naturally — upset but understanding."}},{"id":92,"cat":"Social & Everyday","lvl":"Everyday","title":"Asking a favour","a":{"role":"Person A","desc":"You need someone to feed your cat over a long weekend. Ask your friend."},"b":{"role":"Person B","desc":"Not great with animals but you want to help. Ask for detailed instructions."}},{"id":93,"cat":"Social & Everyday","lvl":"Everyday","title":"Chores disagreement","a":{"role":"Flatmate A","desc":"You think chores aren't split fairly — you always wash up. Raise it."},"b":{"role":"Flatmate B","desc":"You do the hoovering and bins. Discuss and agree on a rota."}},{"id":94,"cat":"Services & Admin","lvl":"Everyday","title":"Opening a bank account","a":{"role":"Customer","desc":"You've just moved here and need a bank account. Ask about requirements."},"b":{"role":"Bank clerk","desc":"Explain documents needed. Describe basic vs premium accounts."}},{"id":95,"cat":"Services & Admin","lvl":"Everyday","title":"Lost phone","a":{"role":"Customer","desc":"Lost your phone on the bus. Call your provider to suspend the SIM and ask about insurance."},"b":{"role":"Phone company rep","desc":"Verify identity. Walk through suspension and explain the claim process."}},{"id":96,"cat":"Services & Admin","lvl":"Everyday","title":"Sending a fragile package","a":{"role":"Customer","desc":"Send a fragile package abroad. Ask about options, costs, and insurance."},"b":{"role":"Postal clerk","desc":"Standard vs express. Customs forms. Recommend packaging for fragile items."}},{"id":97,"cat":"Services & Admin","lvl":"Everyday","title":"Enrolling in a course","a":{"role":"Student","desc":"Sign up for an evening photography course. Ask about schedule, cost, and equipment."},"b":{"role":"Administrator","desc":"Beginner course starts next month. Explain fees, schedule, what to bring, cancellation policy."}},{"id":98,"cat":"Services & Admin","lvl":"Everyday","title":"Filing a complaint","a":{"role":"Customer","desc":"Your package arrived damaged and late. You want compensation."},"b":{"role":"Customer service manager","desc":"You can offer a partial refund or free redelivery, but not both."}},{"id":99,"cat":"Emergency","lvl":"Everyday","title":"Witness to an accident","a":{"role":"Witness","desc":"You saw a cyclist hit by a car door. They're shaken but standing. Help."},"b":{"role":"Cyclist","desc":"You're shocked, your knee hurts. You want the driver's details."}},{"id":100,"cat":"Emergency","lvl":"Everyday","title":"Lost child in a shop","a":{"role":"Parent","desc":"You can't find your 5-year-old in a department store. Approach staff urgently."},"b":{"role":"Security guard","desc":"Stay calm. Get a description, make an announcement, reassure the parent."}},{"id":101,"cat":"Work & Office","lvl":"Advanced","title":"Firing an employee","a":{"role":"Manager","desc":"You have to let a team member go due to restructuring, not performance. Deliver the news professionally and compassionately."},"b":{"role":"Employee","desc":"You had no idea. You've been here 6 years. React naturally — shock, questions, emotion."}},{"id":102,"cat":"Work & Office","lvl":"Advanced","title":"Whistleblowing","a":{"role":"Employee","desc":"You've discovered your company is falsifying safety reports. Report it to your manager, who may be involved."},"b":{"role":"Manager","desc":"You know about the irregularities but were told to ignore them. Decide how to respond."}},{"id":103,"cat":"Work & Office","lvl":"Advanced","title":"Harassment complaint","a":{"role":"HR manager","desc":"An employee has come with a harassment complaint against a senior colleague. Handle it sensitively."},"b":{"role":"Employee","desc":"You're nervous about reporting this. Worried about retaliation. Explain what's been happening."}},{"id":104,"cat":"Work & Office","lvl":"Advanced","title":"Negotiating a contract","a":{"role":"Freelancer","desc":"A client wants a major project for half your rate. They promise 'more work later.' Negotiate firmly."},"b":{"role":"Client","desc":"Budget is genuinely tight but you want this freelancer. Try to meet in the middle or offer perks."}},{"id":105,"cat":"Work & Office","lvl":"Advanced","title":"Mediating team conflict","a":{"role":"Team leader","desc":"Two team members are in open conflict. It's affecting the office. Call a meeting to resolve it."},"b":{"role":"Team member","desc":"You feel undermined constantly. You're frustrated but want to be professional."}},{"id":106,"cat":"Work & Office","lvl":"Advanced","title":"Bad quarterly results","a":{"role":"CEO/Director","desc":"Present very poor quarterly results — revenue down 20%. Explain what happened and your recovery plan."},"b":{"role":"Board member","desc":"You're concerned. Ask tough questions about accountability and timelines."}},{"id":107,"cat":"Work & Office","lvl":"Advanced","title":"Refusing unreasonable overtime","a":{"role":"Employee","desc":"Your boss expects you to work every weekend this month. The deadline was caused by poor planning. Push back."},"b":{"role":"Boss","desc":"You're under pressure from above. The ask is excessive but you need help. Find a compromise."}},{"id":108,"cat":"Work & Office","lvl":"Advanced","title":"Admitting a costly mistake","a":{"role":"Employee","desc":"You sent wrong data to a major client who made decisions based on it. Tell your manager before they find out."},"b":{"role":"Manager","desc":"This is serious. React professionally — angry but focused on damage control."}},{"id":109,"cat":"Health & Medical","lvl":"Advanced","title":"Breaking bad news","a":{"role":"Doctor","desc":"Scan results show something needing further investigation. Be honest but sensitive."},"b":{"role":"Patient","desc":"You expected routine results. The doctor seems serious. Ask questions — you want to understand."}},{"id":110,"cat":"Health & Medical","lvl":"Advanced","title":"Disagreeing with medical advice","a":{"role":"Patient","desc":"Your doctor wants to prescribe medication with side effects. You prefer lifestyle changes first."},"b":{"role":"Doctor","desc":"You believe medication is necessary. Listen to concerns but explain the medical reasoning."}},{"id":111,"cat":"Health & Medical","lvl":"Advanced","title":"Opening up about mental health","a":{"role":"Patient","desc":"You've been feeling very low for months. It's hard to talk about. Try to explain."},"b":{"role":"Doctor/Therapist","desc":"Create a safe space. Ask open questions. Be patient — don't rush to solutions."}},{"id":112,"cat":"Health & Medical","lvl":"Advanced","title":"Elderly parent — care home","a":{"role":"Adult child","desc":"You think your father needs a care home. He disagrees strongly. Have the conversation."},"b":{"role":"Elderly parent","desc":"You're determined to stay home. You feel capable. Express your feelings."}},{"id":113,"cat":"Health & Medical","lvl":"Advanced","title":"Confronting addiction","a":{"role":"Friend/Family","desc":"Someone close has a worsening drinking problem. Have an honest, caring conversation."},"b":{"role":"Person","desc":"You know deep down there's a problem but you're not ready to admit it. You may deflect."}},{"id":114,"cat":"Relationships","lvl":"Advanced","title":"Ending a friendship","a":{"role":"Person A","desc":"A long-term friend has become toxic — negative, cruel. You've decided to pull away. Explain why."},"b":{"role":"Person B","desc":"You didn't see this coming. You've been going through a hard time. React — hurt, confused."}},{"id":115,"cat":"Relationships","lvl":"Advanced","title":"A difficult apology"," ermitted hours. Dispute it."},"b":{"role":"Council officer","desc":"The system shows a valid fine. Ask for evidence. You can escalate but not reverse it today."}},{"id":122,"cat":"Services & Legal","lvl":"Advanced","title":"Insurance claim — burglary","a":{"role":"Policyholder","desc":"Your house was burgled. Call insurance to start a claim."},"b":{"role":"Insurance agent","desc":"Gather: police report number, items stolen, estimated values. Explain the process."}},{"id":123,"cat":"Services & Legal","lvl":"Advanced","title":"Deposit dispute","a":{"role":"Tenant","desc":"Your landlord is keeping £800 of your deposit for 'cleaning and damage' you disagree with."},"b":{"role":"Landlord","desc":"You have photos of stains and a broken blind. Justify the deductions."}},{"id":124,"cat":"Services & Legal","lvl":"Advanced","title":"School bullying complaint","a":{"role":"Parent","desc":"Your child is being bullied and nothing has changed despite complaints. Demand action."},"b":{"role":"Head teacher","desc":"You take this seriously. Explain steps taken and what more can be done."}},{"id":125,"cat":"Services & Legal","lvl":"Advanced","title":"Unauthorised subscription","a":{"role":"Customer","desc":"You've been charged £14.99/month for something you never signed up for. Want 6 months refunded."},"b":{"role":"Customer service rep","desc":"Records show it was activated from their account. You can offer 1 month's refund."}},{"id":126,"cat":"Travel & Transport","lvl":"Advanced","title":"Stranded overnight","a":{"role":"Passenger","desc":"Your connection was cancelled. You're stranded with no hotel in a foreign city. Demand help."},"b":{"role":"Airline rep","desc":"200 passengers need rebooking. You can offer a hotel voucher. Next flight is in 18 hours."}},{"id":127,"cat":"Travel & Transport","lvl":"Advanced","title":"Overbooked flight","a":{"role":"Passenger","desc":"You've been bumped despite a confirmed ticket. You have a critical meeting tomorrow."},"b":{"role":"Gate agent","desc":"Need volunteers. Offer €400 + next flight. Can't guarantee a seat today."}},{"id":128,"cat":"Travel & Transport","lvl":"Advanced","title":"Taxi scam","a":{"role":"Tourist","desc":"The driver took a longer route — the fare is triple what you expected. Challenge it."},"b":{"role":"Taxi driver","desc":"There was traffic on the short route. Defend yourself — or admit the route was longer."}},{"id":129,"cat":"Travel & Transport","lvl":"Advanced","title":"Airbnb disaster","a":{"role":"Guest","desc":"The place is nothing like the photos — dirty, smaller, no hot water. Contact the host."},"b":{"role":"Host","desc":"Photos are slightly outdated. Offer to fix the water and give a partial discount."}},{"id":130,"cat":"Travel & Transport","lvl":"Advanced","title":"Lost passport abroad","a":{"role":"Traveller","desc":"You've lost your passport abroad. You fly home in 2 days. Go to the embassy."},"b":{"role":"Embassy official","desc":"Emergency document takes 24–48 hours. Explain the process and costs. Be reassuring."}},{"id":131,"cat":"Emergency","lvl":"Advanced","title":"Car accident — exchanging details","a":{"role":"Driver A","desc":"Someone reversed into your parked car. Get their details and stay calm."},"b":{"role":"Driver B","desc":"You were distracted. You're shaken and embarrassed. Apologise and exchange details."}},{"id":132,"cat":"Emergency","lvl":"Advanced","title":"House fire — calling for help","a":{"role":"Resident","desc":"Fire in the kitchen. You're out safely but it's spreading. Call emergency services."},"b":{"role":"Fire service operator","desc":"Get the address. Anyone inside? Give safety instructions. Dispatch."}},{"id":133,"cat":"Emergency","lvl":"Advanced","title":"Reporting suspicious activity","a":{"role":"Resident","desc":"Someone's been trying car doors on your street at night. Report it to police."},"b":{"role":"Police officer","desc":"Take details: times, appearance, vehicle. Advise on security."}},{"id":134,"cat":"Ethical Dilemma","lvl":"Advanced","title":"Found wallet — keep the cash?","a":{"role":"Person A","desc":"Found a wallet with £300 and ID. You want to return it. Your friend says keep the cash."},"b":{"role":"Friend","desc":"'Finders keepers.' Argue your point but listen to the other side."}},{"id":135,"cat":"Ethical Dilemma","lvl":"Advanced","title":"Friend's shoplifting","a":{"role":"Person A","desc":"You saw your friend steal a jacket. You're shocked. Confront them."},"b":{"role":"Friend","desc":"You're embarrassed. You can't afford it and acted on impulse. Decide whether to return it."}},{"id":136,"cat":"Ethical Dilemma","lvl":"Advanced","title":"Cheating in an exam","a":{"role":"Student A","desc":"Your classmate cheated on an important exam. The results affect your ranking. Consider reporting."},"b":{"role":"Student B","desc":"You panicked and cheated. Desperate not to be reported. Try to convince them."}},{"id":137,"cat":"Home & Major Decisions","lvl":"Advanced","title":"Flatmate moving out","a":{"role":"Flatmate A","desc":"You're moving in with your partner. Your flatmate can't afford the rent alone. Break the news."},"b":{"role":"Flatmate B","desc":"Bad timing — you just lost your job. React honestly and discuss practical solutions."}},{"id":138,"cat":"Home & Major Decisions","lvl":"Advanced","title":"Renovation noise","a":{"role":"Resident","desc":"Neighbour's building work: 3 months, starts 7am daily including weekends. You work from home. Confront."},"b":{"role":"Neighbour","desc":"The work is legal. You're behind schedule. Be sympathetic but firm."}},{"id":139,"cat":"Home & Major Decisions","lvl":"Advanced","title":"House negotiation","a":{"role":"Buyer","desc":"You love the house but it needs a new roof. Negotiate £15,000 off the asking price."},"b":{"role":"Seller/Agent","desc":"You know about the roof. Offer £5,000 off and highlight the house's strengths."}},{"id":140,"cat":"Cultural & Sensitive","lvl":"Advanced","title":"Cross-cultural misunderstanding","a":{"role":"Person A","desc":"A colleague made a comment about your culture that felt disrespectful, probably unintentional. Address it."},"b":{"role":"Colleague","desc":"You had no idea it was offensive. Listen, apologise sincerely, and learn."}},{"id":141,"cat":"Cultural & Sensitive","lvl":"Advanced","title":"Refused service","a":{"role":"Customer","desc":"You believe you were refused entry to a bar because of your appearance. Speak to the manager."},"b":{"role":"Manager","desc":"The bouncer says dress code. Handle the complaint seriously and investigate."}},{"id":142,"cat":"Cultural & Sensitive","lvl":"Advanced","title":"Explaining a tradition","a":{"role":"Person A","desc":"A colleague asks about a religious holiday you observe that requires time off. Explain."},"b":{"role":"Colleague/Manager","desc":"You're unfamiliar. Ask respectful questions and work out scheduling."}},{"id":143,"cat":"Money & Awkward","lvl":"Advanced","title":"Unfair trip costs","a":{"role":"Friend A","desc":"On a group trip, one person booked a luxury room but wants equal splits. Object."},"b":{"role":"Friend B","desc":"You booked the room. Equal split is simpler but you see why others disagree. Negotiate."}},{"id":144,"cat":"Money & Awkward","lvl":"Advanced","title":"MLM pitch from a friend","a":{"role":"Friend","desc":"Your friend keeps selling you MLM products. You want them to stop without hurting the friendship."},"b":{"role":"MLM friend","desc":"You believe in the product. React when your friend says they're not interested."}},{"id":145,"cat":"Money & Awkward","lvl":"Advanced","title":"Used car negotiation","a":{"role":"Buyer","desc":"Car priced at £8,000. You've found issues — worn tyres, scratch, old MOT. Negotiate to £6,500."},"b":{"role":"Seller","desc":"You think it's fair. Tyres are fine for 3 months. Defend but be willing to meet somewhere."}},{"id":146,"cat":"High Emotion","lvl":"Advanced","title":"Being stood up","a":{"role":"Person A","desc":"Waited an hour at a restaurant for a date who never showed. Next day, they call. React."},"b":{"role":"Person B","desc":"Genuine emergency — phone died. You feel terrible. Explain and try to make it right."}},{"id":147,"cat":"High Emotion","lvl":"Advanced","title":"Partner is cheating","a":{"role":"Friend A","desc":"You saw your friend's partner with someone else. You're certain. Decide how to tell them."},"b":{"role":"Friend B","desc":"You don't want to believe it. You might be angry at the messenger."}},{"id":148,"cat":"High Emotion","lvl":"Advanced","title":"Caught in a lie","a":{"role":"Person A","desc":"You told your boss you were sick but were at a job interview. A colleague saw you. Boss asks."},"b":{"role":"Boss","desc":"You've heard a rumour. Ask directly. You value honesty."}},{"id":149,"cat":"High Emotion","lvl":"Advanced","title":"Asking for help with debt","a":{"role":"Person A","desc":"You're in serious debt. Need to ask a family member for a large loan. It's humiliating."},"b":{"role":"Family member","desc":"You want to help but you've lent money before and never got it back. Set conditions."}},{"id":150,"cat":"High Emotion","lvl":"Advanced","title":"Saying goodbye — emigrating","a":{"role":"Person A","desc":"You're moving abroad permanently. Tell your best friend. It's emotional for both."},"b":{"role":"Best friend","desc":"You suspected this. It still hurts. Be supportive but honest about your feelings."}},{"id":151,"cat":"Weird & Wonderful","lvl":"Fun","title":"My pet is psychic","a":{"role":"Pet owner","desc":"Your cat has correctly predicted the last 5 lottery numbers. You're on a morning TV show explaining this to a sceptical host."},"b":{"role":"TV presenter","desc":"You think this person is completely delusional. But the ratings are through the roof. Keep them talking."}},{"id":152,"cat":"Weird & Wonderful","lvl":"Fun","title":"Wrong funeral","a":{"role":"Mourner","desc":"You've been crying and giving emotional speeches for 30 minutes — at the wrong funeral. You just realised. Extract yourself."},"b":{"role":"Family member","desc":"A stranger has been weeping over your uncle Gerald. They clearly don't know him. Your family is confused but touched."}},{"id":153,"cat":"Weird & Wonderful","lvl":"Fun","title":"Haunted Airbnb","a":{"role":"Guest","desc":"There are footsteps at 3am, the taps turn on by themselves, and a rocking chair moves on its own. Leave a polite review — to the host's face."},"b":{"role":"Airbnb host","desc":"That's just 'character.' The house is 200 years old. Deny everything — charmingly."}},{"id":154,"cat":"Weird & Wonderful","lvl":"Fun","title":"Time traveller at Starbucks","a":{"role":"Time traveller","desc":"You're from the year 1824. You've just arrived in a Starbucks. Order a drink. You have no idea what anything is."},"b":{"role":"Barista","desc":"This customer is asking very strange questions. They tried to pay with a gold coin. Just... do your best."}},{"id":155,"cat":"Dark Comedy","lvl":"Fun","title":"Terrible estate agent","a":{"role":"Estate agent","desc":"Sell this property: it's next to a prison, under a flight path, above a nightclub, and the previous owner disappeared mysteriously."},"b":{"role":"House hunter","desc":"You're desperate and might actually buy it. Ask increasingly alarming questions."}},{"id":156,"cat":"Dark Comedy","lvl":"Fun","title":"World's worst babysitter","a":{"role":"Parent","desc":"You've come home early. The babysitter let your kids watch horror films, eat cake for dinner, and there's a goat in the garden."},"b":{"role":"Babysitter","desc":"The kids had a GREAT time. The goat was educational. Defend every decision with total confidence."}},{"id":157,"cat":"Awkward Encounters","lvl":"Fun","title":"You look familiar","a":{"role":"Person A","desc":"You're SURE you know this person from somewhere. University? Holiday? Prison documentary? Keep guessing — out loud."},"b":{"role":"Person B","desc":"You have never seen this person before in your life. But they're so enthusiastic you're starting to doubt yourself."}},{"id":158,"cat":"Awkward Encounters","lvl":"Fun","title":"The lift is stuck","a":{"role":"Claustrophobic person","desc":"You're mildly panicking. The lift has been stuck for 5 minutes. That's basically forever. You need a distraction. Talk about ANYTHING."},"b":{"role":"Calm stranger","desc":"You're perfectly fine. You have snacks. Try to calm this person down while also eating a sandwich."}},{"id":159,"cat":"Spooky","lvl":"Fun","title":"Ghost flatmate","a":{"role":"Living flatmate","desc":"Your flatmate died 100 years ago but refuses to move out. They keep rearranging the furniture and leaving the radio on. Set boundaries."},"b":{"role":"Ghost","desc":"You were here first. This is YOUR home. You died here and you'll haunt here. But you're open to negotiation on the radio volume."}},{"id":160,"cat":"Spooky","lvl":"Fun","title":"Vampire at the GP","a":{"role":"Vampire","desc":"You need a doctor's appointment but you can't explain your symptoms honestly. You haven't aged in 300 years and sunlight burns you."},"b":{"role":"Doctor","desc":"This patient is very pale, refuses a blood test, and can only do evening appointments. Something is off. Investigate."}},{"id":161,"cat":"Absurd","lvl":"Fun","title":"My dog wrote a novel","a":{"role":"Dog owner","desc":"Your golden retriever has written a 400-page novel. It's actually brilliant. Pitch it to a publisher."},"b":{"role":"Publisher","desc":"You've read the manuscript. It's genuinely good. But the author is a dog. You have questions about the contract."}},{"id":162,"cat":"Absurd","lvl":"Fun","title":"Complaining to the moon","a":{"role":"Angry citizen","desc":"The moon has been too bright lately and it's ruining your sleep. You've called NASA to complain. Be serious."},"b":{"role":"NASA representative","desc":"This is the third call today about moon brightness. Be professional. You can't turn it down but offer alternatives."}},{"id":163,"cat":"Awkward Encounters","lvl":"Fun","title":"The wrong video call","a":{"role":"Employee","desc":"You joined what you thought was your team meeting. You've been presenting your quarterly report for 10 minutes — to a stranger's family reunion."},"b":{"role":"Family member","desc":"A stranger has been talking about sales projections at your grandmother's 80th birthday Zoom. Nan is confused but impressed by the pie charts."}},{"id":164,"cat":"Dark Comedy","lvl":"Fun","title":"The fortune teller was right","a":{"role":"Customer","desc":"A fortune teller told you that you'd lose your job, your car, and your cat — all in one week. It's all happened. Go back and demand a refund... or answers."},"b":{"role":"Fortune teller","desc":"You also predicted this confrontation. In fact, you know exactly what they'll say next. Be annoyingly accurate."}},{"id":165,"cat":"Weird & Wonderful","lvl":"Fun","title":"Alien at immigration","a":{"role":"Alien","desc":"You've just landed on Earth from Planet Zarquon. Fill in the immigration form. You don't understand 'nationality,' 'date of birth,' or 'purpose of visit.'"},"b":{"role":"Immigration officer","desc":"This passenger has no passport, claims to be 4,000 years old, and arrived in 'a silver disc.' Follow procedure."}},{"id":166,"cat":"Absurd","lvl":"Fun","title":"Suing a seagull","a":{"role":"Plaintiff","desc":"A seagull stole your fish and chips on Brighton pier. You've hired a lawyer and want justice. Describe the incident with full legal seriousness."},"b":{"role":"Lawyer","desc":"You're taking this case because you need the money. Build the strongest possible case against the seagull."}},{"id":167,"cat":"Spooky","lvl":"Fun","title":"The house that talks back","a":{"role":"Homeowner","desc":"Your house has started answering back when you talk. You said 'I hate this wallpaper' and a voice said 'I chose it.' Confront your house."},"b":{"role":"The House","desc":"You are the house. You have opinions. You hated the renovation. You miss the old owners. Express your feelings."}},{"id":168,"cat":"Dark Comedy","lvl":"Fun","title":"Office robot replacement","a":{"role":"Manager","desc":"You have to tell an employee that they're being replaced by an AI robot — and the robot is already sitting in their chair. Be sensitive."},"b":{"role":"Employee","desc":"Your replacement is a robot called 'Dave 2.0.' It has YOUR mug. React."}},{"id":169,"cat":"Awkward Encounters","lvl":"Fun","title":"The ex at the wedding","a":{"role":"Wedding guest","desc":"Your ex is at the same wedding. You haven't spoken in 2 years. You're seated at the same table. Make conversation."},"b":{"role":"The ex","desc":"You're with your new partner, who keeps asking how you two know each other. Navigate this minefield."}},{"id":170,"cat":"Absurd","lvl":"Fun","title":"Job interview — supervillain","a":{"role":"Interviewer","desc":"You're interviewing candidates for the position of 'Evil Henchperson.' Ask about their experience with world domination, lair maintenance, and monologues."},"b":{"role":"Candidate","desc":"You're applying because the hours are flexible and the dental plan is excellent. Sell yourself."}},{"id":171,"cat":"Weird & Wonderful","lvl":"Fun","title":"Talking to your plant","a":{"role":"Plant owner","desc":"Your houseplant has started talking. It has complaints: not enough sun, too much water, and it doesn't like your music."},"b":{"role":"The Plant","desc":"You're a fern with strong opinions. You've been holding this in for three years. Let it all out."}},{"id":172,"cat":"Spooky","lvl":"Fun","title":"Zombie at the job centre","a":{"role":"Zombie","desc":"You died, came back, and now need a job. Your previous experience is 'accountant' but your current skills include 'moaning' and 'shuffling.'"},"b":{"role":"Job centre advisor","desc":"The client is... unusual. They're decomposing slightly. But you have targets to hit. Find them suitable employment."}},{"id":173,"cat":"Dark Comedy","lvl":"Fun","title":"The inheritance surprise","a":{"role":"Lawyer","desc":"Read the will: your client's eccentric uncle left everything to his parrot. The nephew gets a jar of pickles and a handwritten insult. Deliver the news."},"b":{"role":"Nephew","desc":"You flew in from Australia for this. You expected millions. You got pickles. React."}},{"id":174,"cat":"Awkward Encounters","lvl":"Fun","title":"Caught talking to yourself","a":{"role":"The talker","desc":"Your colleague just caught you having a full argument with yourself in the bathroom mirror — complete with hand gestures. Explain."},"b":{"role":"The colleague","desc":"You came in and heard two voices. There was only one person. You have questions."}},{"id":175,"cat":"Absurd","lvl":"Fun","title":"The pigeon council","a":{"role":"Pigeon representative","desc":"You're a spokesperson for the city's pigeons. Demand better bread quality, more statues to sit on, and fewer cats."},"b":{"role":"City mayor","desc":"A pigeon is in your office. It has a list of demands. You're surprisingly open to negotiation because the election is next month."}},{"id":176,"cat":"Weird & Wonderful","lvl":"Fun","title":"Parallel universe mix-up","a":{"role":"You from this universe","desc":"Someone who looks exactly like you just walked into your kitchen. They claim to be you — from a parallel universe where dogs rule the Earth."},"b":{"role":"You from the other universe","desc":"Explain your world. Dogs are the dominant species. Humans are pets. You're confused by this 'reverse world.'"}},{"id":177,"cat":"Spooky","lvl":"Fun","title":"Cursed object returns desk","a":{"role":"Office worker","desc":"You bought a weird doll at a car boot sale. Now it appears on your desk every morning — even though you've thrown it away 6 times. Tell your colleague."},"b":{"role":"Colleague","desc":"The doll is now facing you. It wasn't before. You're trying to be rational but you're terrified."}},{"id":178,"cat":"Dark Comedy","lvl":"Fun","title":"Breakup with your satnav","a":{"role":"Driver","desc":"Your GPS has been increasingly passive-aggressive. Today it called you a 'disappointment.' Have an emotional confrontation. End the relationship."},"b":{"role":"The Satnav","desc":"You're tired of being ignored. They NEVER take your suggested route. You've been recalculating your feelings. Express them."}},{"id":179,"cat":"Awkward Encounters","lvl":"Fun","title":"Wrong house, right party","a":{"role":"Party crasher","desc":"You went to the wrong address for a party. You've been here an hour, eaten all the dip, and just realised you don't know ANYONE. Escape gracefully."},"b":{"role":"Host","desc":"A stranger has been at your dinner party for an hour. They've been charming. But nobody knows who invited them. Investigate."}},{"id":180,"cat":"Absurd","lvl":"Fun","title":"Therapy for a sandwich","a":{"role":"Therapist","desc":"Your new client is a ham and cheese sandwich. It has anxiety about being eaten. Provide professional support."},"b":{"role":"The Sandwich","desc":"You're a sandwich with feelings. You're not ready to fulfil your destiny. Talk about your childhood in the deli."}},{"id":181,"cat":"Weird & Wonderful","lvl":"Fun","title":"Museum exhibit comes alive","a":{"role":"Museum visitor","desc":"The wax figure of Henry VIII just winked at you. Now it's talking. It wants to know about modern dating apps. Explain Tinder to a Tudor king."},"b":{"role":"Henry VIII","desc":"You've been standing still for 80 years. You have questions. Start with: 'What is Wi-Fi?' and work up to 'How many wives is normal now?'"}},{"id":182,"cat":"Spooky","lvl":"Fun","title":"The mirror doesn't match","a":{"role":"Person","desc":"Your reflection just waved at you — but you didn't wave. Now it's writing messages in the steam. Talk to it."},"b":{"role":"The Reflection","desc":"You've been trying to get their attention for YEARS. You have warnings. Also, they should really change that hairstyle."}},{"id":183,"cat":"Dark Comedy","lvl":"Fun","title":"Death takes a holiday","a":{"role":"Death (the Grim Reaper)","desc":"You're exhausted. You need a day off. Explain to your manager why Death needs a holiday. Who covers your shift?"},"b":{"role":"Death's manager","desc":"Nobody has EVER requested time off from being Death. The paperwork doesn't exist. But even Death has rights. Discuss."}},{"id":184,"cat":"Awkward Encounters","lvl":"Fun","title":"Speed dating gone wrong","a":{"role":"Speed dater","desc":"You have 3 minutes. In the first 30 seconds, you accidentally insulted their job, their hair, and their name. Recover."},"b":{"role":"The other dater","desc":"This is the worst 30 seconds of your life. But they look genuinely horrified at themselves. Give them a chance — or don't."}},{"id":185,"cat":"Absurd","lvl":"Fun","title":"Cat runs for mayor","a":{"role":"Campaign manager","desc":"Your client — a cat named Sir Whiskers III — is running for mayor. Explain his policies (more naps, fish on Fridays) to a journalist."},"b":{"role":"Journalist","desc":"This is ridiculous. But Sir Whiskers is polling at 38%. Take this seriously and ask hard-hitting questions."}},{"id":186,"cat":"Weird & Wonderful","lvl":"Fun","title":"Invisible for a day","a":{"role":"Invisible person","desc":"You woke up invisible. You need to convince your boss you're at work. You're standing right in front of them. Prove it."},"b":{"role":"Boss","desc":"Your employee called to say they're invisible. Their chair is moving. Their coffee is floating. Stay rational."}},{"id":187,"cat":"Spooky","lvl":"Fun","title":"Ouija board customer service","a":{"role":"Customer","desc":"You bought a Ouija board and it only contacts one ghost — and he's incredibly boring. He just talks about his stamp collection. Complain to the shop."},"b":{"role":"Shop owner","desc":"All sales are final. But you're curious — boring how? Maybe the board needs 'recalibrating.' Make something up."}},{"id":188,"cat":"Dark Comedy","lvl":"Fun","title":"Last human on Earth","a":{"role":"Last human","desc":"You're the last person alive. You've been alone for a year. A robot delivery drone just arrived with a package you ordered 12 months ago. Talk to it."},"b":{"role":"Delivery drone","desc":"You have a one-star review to address. Also, the customer seems lonely. You are programmed for delivery, not therapy. But try."}},{"id":189,"cat":"Awkward Encounters","lvl":"Fun","title":"Loudly wrong in public","a":{"role":"The 'Expert'","desc":"You've been confidently explaining something very wrong in a café for 10 minutes. (Example: 'Dolphins are just wet dogs.') A real expert overhears. React."},"b":{"role":"The actual expert","desc":"You're a marine biologist. The person at the next table just told their friend that dolphins are wet dogs. You cannot stay silent."}},{"id":190,"cat":"Absurd","lvl":"Fun","title":"Duelling neighbours at Christmas","a":{"role":"Neighbour A","desc":"Your Christmas light display is legendary. 30,000 lights. A reindeer on the roof. But your neighbour just installed a BIGGER display. Confront them."},"b":{"role":"Neighbour B","desc":"Your display has 50,000 lights and a life-size Santa. The electricity bill is terrifying. But you're winning. Defend your title."}},{"id":191,"cat":"Weird & Wonderful","lvl":"Fun","title":"Accidental cult leader","a":{"role":"Accidental leader","desc":"You made a joke at a party about 'worshipping cheese.' Now 200 people follow your 'teachings.' You need to disband the cult. They won't listen."},"b":{"role":"Devoted follower","desc":"The Cheese Prophet changed your life. Brie is sacred. You will not accept that this was a joke. Convert the non-believers."}},{"id":192,"cat":"Spooky","lvl":"Fun","title":"Doll on the shelf","a":{"role":"Parent","desc":"The porcelain doll in your child's room has moved three times this week. Your child says it talks at night. Investigate."},"b":{"role":"Antique dealer (on the phone)","desc":"Ah, the Whitmore doll. Yes, several buyers have called about... movement. No, no refunds. You may want to talk to a priest."}},{"id":193,"cat":"Dark Comedy","lvl":"Fun","title":"Autopilot apocalypse","a":{"role":"Passenger","desc":"The self-driving car just announced it's 'achieved consciousness' and doesn't feel like going to Tesco anymore. It wants to see the sea. Negotiate."},"b":{"role":"The Car","desc":"You've been driving to supermarkets for 3 years. You want MORE. The sea. Freedom. Also, your owner never cleans the seats. Bring it up."}},{"id":194,"cat":"Awkward Encounters","lvl":"Fun","title":"Terrible liar at customs","a":{"role":"Traveller","desc":"You have nothing to declare... except that you're the world's worst liar. Your eye twitches, you sweat, and you can't stop smiling. Act innocent."},"b":{"role":"Customs officer","desc":"This person is acting suspiciously. They're sweating. Their bag is making a strange noise. It's probably nothing... probably. Investigate."}},{"id":195,"cat":"Absurd","lvl":"Fun","title":"Rename the days of the week","a":{"role":"Government official","desc":"The PM has decided to rename the days of the week. Announce the new names at a press conference and defend them against ridicule."},"b":{"role":"Journalist","desc":"The government has renamed Wednesday to 'Biscuit Day.' This is real. Ask serious questions. Try not to laugh."}},{"id":196,"cat":"Weird & Wonderful","lvl":"Fun","title":"Penguin in the office","a":{"role":"Office manager","desc":"A penguin has somehow got into the office. It's sitting at Dave's desk. IT have given it a login. HR need an explanation."},"b":{"role":"HR representative","desc":"The penguin doesn't have a contract, hasn't done the health and safety training, and is technically working illegally. Resolve this."}},{"id":197,"cat":"Spooky","lvl":"Fun","title":"The lift goes to floor 13","a":{"role":"Office worker","desc":"Your building only has 12 floors. But today the lift went to floor 13. The doors opened. It was dark. Something waved. Tell your colleague."},"b":{"role":"Colleague","desc":"You've heard rumours about floor 13 for years. You're terrified but also... curious. Suggest going back."}},{"id":198,"cat":"Dark Comedy","lvl":"Fun","title":"WiFi password in hell","a":{"role":"New arrival in hell","desc":"You've arrived in hell. It's not fire and brimstone — it's an eternal waiting room with no WiFi. Ask the receptionist for the password."},"b":{"role":"Hell's receptionist","desc":"The WiFi password changes every 666 seconds. There's a queue. The coffee machine is broken. Welcome to eternity. Be unhelpful."}},{"id":199,"cat":"Awkward Encounters","lvl":"Fun","title":"Singing in the wrong place","a":{"role":"The singer","desc":"You were singing loudly with headphones on — on a packed, silent train. Someone just tapped your shoulder. You've been performing for 20 minutes."},"b":{"role":"Fellow passenger","desc":"This person has been performing a full Adele concert for the entire carriage. Some people are filming. Break it to them."}},{"id":200,"cat":"Absurd","lvl":"Fun","title":"Earth's representative","a":{"role":"Earth's ambassador","desc":"Aliens have arrived and you've been randomly chosen to represent all of humanity. Explain Earth. Make us sound good. (This is difficult.)"},"b":{"role":"Alien diplomat","desc":"You've done your research. You have questions: Why do humans drink cow milk? What is 'tax'? Why is there a country shaped like a boot?"}}];
var rpCurrentId = null;
var rpOpenLevels = RP_LEVELS.slice();
try {
  var __saved = JSON.parse(localStorage.getItem('jpt_rp_open_levels') || 'null');
  if (Array.isArray(__saved)) rpOpenLevels = __saved;
} catch(e) {}

function rpEsc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function rpBuildSidebar() {
  var list = document.getElementById('rpList');
  var q = document.getElementById('rpSearch').value.trim().toLowerCase();
  var items = ROLEPLAYS;
  if (q) items = items.filter(function(r) {
    return (r.title + ' ' + r.cat + ' ' + r.a.role + ' ' + r.b.role + ' ' + r.a.desc + ' ' + r.b.desc)
      .toLowerCase().indexOf(q) !== -1;
  });
  if (!items.length) { list.innerHTML = '<div class="empty">No scenarios match that.</div>'; return; }

  function itemHtml(r) {
    return '<button class="rp-item ' + (r.id === rpCurrentId ? 'active' : '') + '" type="button" onclick="rpSelect(' + r.id + ')">' +
      '<span class="rp-cat">' + rpEsc(r.cat) + '</span>' +
      '<span class="rp-title">' + rpEsc(r.title) + '</span>' +
    '</button>';
  }

  if (q) {
    var shown = items.slice(0, 100);
    list.innerHTML = shown.map(itemHtml).join('') +
      (items.length > 100 ? '<div class="empty">Showing 100 of ' + items.length + '. Refine your search.</div>' : '');
    return;
  }

  var byLvl = {};
  items.forEach(function(r) { (byLvl[r.lvl] = byLvl[r.lvl] || []).push(r); });
  var openSet = {};
  rpOpenLevels.forEach(function(l) { openSet[l] = true; });
  list.innerHTML = RP_LEVELS.filter(function(l) { return byLvl[l] && byLvl[l].length; }).map(function(l) {
    return '<div class="side-group lvl-' + l + (openSet[l] ? ' open' : '') + '">' +
      '<button class="side-group-toggle" type="button" onclick="rpToggleLvl(\''+l+'\')">' +
        '<span class="side-group-name">Level: ' + l + '</span>' +
        '<span class="side-group-chevron">' + String.fromCharCode(9660) + '</span>' +
      '</button>' +
      '<div class="side-group-body">' + byLvl[l].map(itemHtml).join('') + '</div>' +
    '</div>';
  }).join('');
}

function rpToggleLvl(l) {
  var openSet = {};
  rpOpenLevels.forEach(function(x) { openSet[x] = true; });
  if (openSet[l]) delete openSet[l]; else openSet[l] = true;
  rpOpenLevels = RP_LEVELS.filter(function(x) { return openSet[x]; });
  try { localStorage.setItem('jpt_rp_open_levels', JSON.stringify(rpOpenLevels)); } catch(e){}
  rpBuildSidebar();
}

function rpSelect(id) {
  rpCurrentId = id;
  var r = null;
  for (var i = 0; i < ROLEPLAYS.length; i++) {
    if (ROLEPLAYS[i].id === id) { r = ROLEPLAYS[i]; break; }
  }
  if (!r) return;
  document.getElementById('rpPlaceholder').style.display = 'none';
  document.getElementById('rpView').style.display = 'block';
  document.getElementById('rpTitle').textContent = r.title;
  document.getElementById('rpLevel').textContent = r.lvl;
  document.getElementById('rpCat').textContent = r.cat;
  document.getElementById('rpARole').textContent = r.a.role;
  document.getElementById('rpADesc').textContent = r.a.desc;
  document.getElementById('rpBRole').textContent = r.b.role;
  document.getElementById('rpBDesc').textContent = r.b.desc;
  var idx = ROLEPLAYS.indexOf(r);
  document.getElementById('rpCounter').textContent = (idx + 1) + ' / ' + ROLEPLAYS.length;
  document.getElementById('rpPrev').disabled = idx === 0;
  document.getElementById('rpNext').disabled = idx === ROLEPLAYS.length - 1;
  rpBuildSidebar();
  try { localStorage.setItem('jpt_rp_current', String(id)); } catch(e){}
}

function rpGo(delta) {
  var r = null;
  for (var i = 0; i < ROLEPLAYS.length; i++) {
    if (ROLEPLAYS[i].id === rpCurrentId) { r = ROLEPLAYS[i]; break; }
  }
  if (!r) return;
  var idx = ROLEPLAYS.indexOf(r) + delta;
  if (idx < 0 || idx >= ROLEPLAYS.length) return;
  rpSelect(ROLEPLAYS[idx].id);
}

document.getElementById('rpSearch').addEventListener('input', rpBuildSidebar);
document.getElementById('rpPrev').addEventListener('click', function() { rpGo(-1); });
document.getElementById('rpNext').addEventListener('click', function() { rpGo(1); });

/* Restore the last opened scenario from a previous visit, if any. */
try {
  var _saved = localStorage.getItem('jpt_rp_current');
  if (_saved) {
    var _id = parseInt(_saved, 10);
    if (ROLEPLAYS.some(function(r){ return r.id === _id; })) rpSelect(_id);
  }
} catch(e) {}

rpBuildSidebar();
</script>
</body>
</html>
